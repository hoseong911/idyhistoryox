<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>역사 OX 퀴즈</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ffd1dc, #e0f7fa, #d5ecd4);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --primary-blue: #4a90e2;
            --primary-red: #e74c3c;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            overflow: hidden;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            padding: 30px;
            width: 90%;
            max-width: 550px;
            text-align: center;
            position: relative;
        }

        h1 { font-size: 1.5rem; margin-bottom: 25px; cursor: pointer; user-select: none; line-height: 1.3; }

        .progress-container {
            width: 100%; height: 10px; background: rgba(255, 255, 255, 0.3);
            border-radius: 10px; margin-bottom: 15px; overflow: hidden; display: none;
        }
        #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #a2d2ff, #bde0fe); transition: width 0.3s ease; }

        /* 상태 표시 영역 (문제 번호 & 정답률) */
        #status-container {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            margin-bottom: 20px;
            padding: 0 10px;
        }
        #quiz-status { color: #666; font-weight: bold; }
        #accuracy-status { font-weight: bold; transition: color 0.3s; }

        .section { display: none; }
        .active { display: block; }

        input[type="text"], input[type="number"], select {
            width: 80%; padding: 12px; border-radius: 10px; border: 1px solid #ddd;
            font-family: 'Pretendard', sans-serif; margin-bottom: 15px; font-size: 1rem;
            text-align: center; background: rgba(255, 255, 255, 0.8);
        }

        .main-btn {
            font-family: 'Pretendard', sans-serif; font-size: 1.1rem; font-weight: bold;
            padding: 12px 25px; border: none; border-radius: 12px; cursor: pointer;
            background: #fff; color: #555; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s; margin: 5px;
        }
        .main-btn:hover { transform: translateY(-2px); background: #fdfdfd; }
        .main-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        #question-text { font-size: 1.4rem; font-weight: 600; margin: 20px 0 30px 0; line-height: 1.5; word-break: keep-all; min-height: 80px; }
        .ox-btn { font-size: 2rem; padding: 20px 50px; }
        .btn-o { color: var(--primary-blue); }
        .btn-x { color: var(--primary-red); }

        #custom-modal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 100; backdrop-filter: blur(5px);
        }
        .modal-msg { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: var(--primary-red); }

        .notice { font-size: 0.85rem; color: #d63031; background: #fff5f5; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .note-list { max-height: 180px; overflow-y: auto; text-align: left; background: rgba(255, 255, 255, 0.6); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .note-item { margin-bottom: 8px; font-size: 0.9rem; border-bottom: 1px dashed #ddd; padding-bottom: 5px; }
        .note-author { font-weight: bold; color: var(--primary-blue); }

        #admin-btn { display: none; margin-top: 20px; font-size: 0.8rem; background: #fab1a0; border: none; padding: 8px; border-radius: 5px; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1 id="quiz-title">✨ 인천동양중 3학년 1학기<br>1회시험 대비 역사 OX 퀴즈 ✨</h1>
        
        <div class="progress-container" id="progress-container"><div id="progress-fill"></div></div>

        <div id="login-section" class="section active">
            <input type="number" id="student-id" placeholder="학번 (예: 30101)">
            <input type="text" id="student-name" placeholder="이름 (예: 김동양)">
            <p style="margin: 10px 0 5px; font-weight: bold;">풀어볼 문제 수를 선택하세요</p>
            <select id="question-count">
                <option value="10">10문제 (가볍게 몸풀기)</option>
                <option value="20">20문제 (실력 점검)</option>
                <option value="30">30문제 (실전 모의고사)</option>
                <option value="50">50문제 (집중 훈련)</option>
                <option value="100">100문제 (시험 대비 마스터)</option>
                <option value="200">전체 문제 (시험 범위 끝장보기 🔥)</option>
            </select>
            <br>
            <button class="main-btn" onclick="startQuiz()">퀴즈 시작!</button>
        </div>

        <div id="quiz-section" class="section">
            <div id="status-container">
                <div id="quiz-status"></div>
                <div id="accuracy-status">정답률: -%</div>
            </div>
            <div id="question-text"></div>
            <div class="btn-group">
                <button class="main-btn ox-btn btn-o" onclick="checkAnswer('O')">O</button>
                <button class="main-btn ox-btn btn-x" onclick="checkAnswer('X')">X</button>
            </div>
        </div>

        <div id="note-input-section" class="section">
            <h2 style="font-size: 1.2rem; color: var(--primary-blue);">정답입니다! (X)</h2>
            <div class="notice">🚨 다른 친구들도 참고하니 바르게 고쳐 적어주세요!</div>
            <input type="text" id="note-input" placeholder="틀린 이유나 올바른 내용을 입력하세요.">
            <div>
                <button id="submit-btn" class="main-btn" style="background:var(--primary-blue); color:white;" onclick="submitNote()">등록</button>
                <button class="main-btn" onclick="skipNote()">건너뛰기</button>
            </div>
        </div>

        <div id="note-view-section" class="section">
            <h2 style="font-size: 1.1rem;">친구들의 오답 노트</h2>
            <div class="note-list" id="note-list-container"></div>
            <button class="main-btn" onclick="nextQuiz()">다음 문제</button>
        </div>

        <div id="custom-modal">
            <div class="modal-msg">아쉬워요! 틀렸습니다. 🧐</div>
            <button class="main-btn" onclick="closeModal()">다시 생각해보기</button>
        </div>

        <button id="admin-btn" onclick="resetComments()">🚨 전체 데이터 초기화</button>
    </div>

    <script>
        // 파이어베이스 설정
        const firebaseConfig = {

            authDomain: "historyoxquiz.firebaseapp.com",
            projectId: "historyoxquiz",
            storageBucket: "historyoxquiz.firebasestorage.app",
            messagingSenderId: "353431656454",

        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let userInfo = { id: "", name: "", max: 0 };

        // 정답률 계산을 위한 변수 추가
        let correctCount = 0;

        const allQuizzes = [

            { question: "구석기 시대의 대표적 유적지로 경기 연천 전곡리, 충남 공주 석장리 등이 있다.", answer: "O" },

            // 1강 - 신석기

        function startQuiz() {
            const sid = document.getElementById('student-id').value;
            const sname = document.getElementById('student-name').value;
            const count = parseInt(document.getElementById('question-count').value);

            if(!sid || !sname) return alert("학번과 이름을 모두 입력해주세요!");

            // 퀴즈 시작 시 정답률 및 상태 초기화
            correctCount = 0;
            answeredCount = 0;
            
            userInfo.id = sid; 
            userInfo.name = sname; 
            userInfo.max = count > allQuizzes.length ? allQuizzes.length : count; 

            selectedQuizzes = [...allQuizzes].sort(() => 0.5 - Math.random()).slice(0, userInfo.max);
            
            document.getElementById('login-section').classList.remove('active');
            document.getElementById('quiz-section').classList.add('active');
            document.getElementById('progress-container').style.display = 'block';
            document.getElementById('status-container').style.display = 'flex';
            
            loadQuiz();
        }

        function loadQuiz() {
            isFirstAttempt = true; // 새 문제 로딩 시 첫 시도로 리셋
            
            const q = selectedQuizzes[currentQuizIndex];
            document.getElementById('question-text').innerText = q.question;
            document.getElementById('quiz-status').innerText = `${currentQuizIndex + 1} / ${userInfo.max}`;
            
            const percent = (currentQuizIndex / userInfo.max) * 100;
            document.getElementById('progress-fill').style.width = percent + "%";
            
            updateAccuracyDisplay();
        }
        
        function updateAccuracyDisplay() {
            const accElement = document.getElementById('accuracy-status');
            if (answeredCount === 0) {
                accElement.innerText = "정답률: -%";
                accElement.style.color = "#333";
            } else {
                const rate = Math.round((correctCount / answeredCount) * 100);
                accElement.innerText = `정답률: ${rate}%`;
                
                // 정답률에 따른 색상 변화 (80% 이상 파랑, 50% 이상 주황, 그 미만 빨강)
                if(rate >= 80) accElement.style.color = "var(--primary-blue)";
                else if(rate >= 50) accElement.style.color = "#e67e22";
                else accElement.style.color = "var(--primary-red)";
            }
        }

        function checkAnswer(choice) {
            const correct = selectedQuizzes[currentQuizIndex].answer;
            
            // 첫 시도일 때만 정답률 데이터에 반영
            if (isFirstAttempt) {
                answeredCount++;
                if (choice === correct) {
                    correctCount++;
                }
                isFirstAttempt = false;
                updateAccuracyDisplay();
            }
            
            if (choice === correct) {
                if (correct === 'X') showSection('note-input-section');
                else nextQuiz();
            } else {
                document.getElementById('custom-modal').style.display = 'block';
            }
        }

        function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }

        function submitNote() {
            const txt = document.getElementById('note-input').value;
            if(txt.trim() === "") return alert("내용을 입력해주세요.");
            
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "등록 중...";

            const qKey = allQuizzes.indexOf(selectedQuizzes[currentQuizIndex]); 

            db.collection("quiz_notes").add({
                quizId: qKey,
                author: `${userInfo.id} ${userInfo.name}`,
                text: txt,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('note-input').value = "";
                btn.disabled = false;
                btn.innerText = "등록";
                showOtherNotes();
            }).catch(error => {
                alert("오류가 발생했습니다: " + error.message);
                btn.disabled = false;
                btn.innerText = "등록";
            });
        }

        function skipNote() { showOtherNotes(); }

        function showOtherNotes() {
            showSection('note-view-section');
            const container = document.getElementById('note-list-container');
            container.innerHTML = "<p style='text-align:center; color:#999;'>데이터를 불러오는 중...</p>";
            
            const qKey = allQuizzes.indexOf(selectedQuizzes[currentQuizIndex]);

            db.collection("quiz_notes").where("quizId", "==", qKey)
              .orderBy("timestamp", "asc")
              .get()
              .then((querySnapshot) => {
                  container.innerHTML = "";
                  if (querySnapshot.empty) {
                      container.innerHTML = "<p style='text-align:center; color:#999;'>아직 등록된 오답 노트가 없습니다.<br>첫 번째로 작성해보세요!</p>";
                  } else {
                      querySnapshot.forEach((doc) => {
                          const n = doc.data();
                          container.innerHTML += `<div class="note-item"><span class="note-author">${n.author}</span>: ${n.text}</div>`;
                      });
                  }
              });
        }

        function nextQuiz() {
            currentQuizIndex++;
            if (currentQuizIndex < userInfo.max) {
                showSection('quiz-section');
                loadQuiz();
            } else {
                document.getElementById('progress-fill').style.width = "100%";
                document.getElementById('question-text').innerText = "🎉 모든 퀴즈 완료! 시험 화이팅! 💯";
                document.querySelector('.btn-group').style.display = 'none';
                document.getElementById('status-container').style.display = 'none';
                showSection('quiz-section');
            }
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        let count = 0;
        document.getElementById('quiz-title').onclick = () => {
            count++;
            if(count >= 5) { document.getElementById('admin-btn').style.display = 'inline-block'; count = 0; }
            setTimeout(() => count = 0, 2000);
        };

        function resetComments() {
            if(confirm("모든 오답 노트를 데이터베이스에서 완전히 삭제하시겠습니까?")) {
                db.collection("quiz_notes").get().then((querySnapshot) => {
                    const batch = db.batch();
                    querySnapshot.forEach((doc) => { batch.delete(doc.ref); });
                    return batch.commit();
                }).then(() => {
                    alert("전체 데이터가 초기화되었습니다.");
                    document.getElementById('admin-btn').style.display = 'none';
                });
            }
        }
    </script>

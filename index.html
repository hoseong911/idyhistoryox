<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>역사 OX 퀴즈</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ffd1dc, #e0f7fa, #d5ecd4);
            --btn-o-gradient: linear-gradient(45deg, #4facfe, #00f2fe);
            --btn-x-gradient: linear-gradient(45deg, #ff9a9e, #fad0c4);
            --btn-finish-gradient: linear-gradient(45deg, #f0932b, #ffbe76);
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #222;
            --text-sub: #666;
            --primary-blue: #4a90e2;
            --primary-red: #e74c3c;
            --primary-green: #2ecc71;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .glass-card::-webkit-scrollbar { display: none; }
        
        h1, h2, .ox-btn, .jua-font { 
            font-family: 'Jua', sans-serif; 
            font-weight: normal; 
        }

        h1 { 
            font-size: 1.8rem; 
            margin-bottom: 30px; 
            cursor: pointer; 
            user-select: none; 
            line-height: 1.4;
            word-break: keep-all;
            color: #333;
        }
        h1 span.sub-title {
            font-size: 2.2rem;
            display: block;
            margin-top: 8px;
            color: #d35400;
        }

        .progress-container {
            width: 100%; height: 10px; background: rgba(255, 255, 255, 0.4);
            border-radius: 10px; margin-bottom: 20px; overflow: hidden; display: none;
        }
        #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4facfe, #00f2fe); transition: width 0.3s ease; }

        #status-container { display: flex; justify-content: space-between; font-size: 1rem; margin-bottom: 25px; padding: 0 10px; }
        #quiz-status { color: var(--text-sub); font-weight: bold; }
        #accuracy-status { font-weight: bold; }

        .section { display: none; }
        .active { display: block; }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        input[type="text"], input[type="number"], input[type="password"], select {
            width: 90%; padding: 15px; border-radius: 15px; border: 1px solid #ddd;
            font-family: 'Pretendard', sans-serif; margin-bottom: 20px; font-size: 1rem;
            text-align: center; background: rgba(255, 255, 255, 0.9); box-sizing: border-box;
        }

        .main-btn {
            font-family: 'Pretendard', sans-serif; font-size: 1.1rem; font-weight: 800;
            padding: 15px 30px; border: none; border-radius: 50px; 
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.2s ease; margin: 8px; width: 90%; max-width: 350px;
            color: white; 
        }
        .main-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
        .main-btn:active { transform: translateY(-1px); }
        .main-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .start-btn { background: linear-gradient(45deg, #a8e6cf, #dcedc1); color: #444; }
        .skip-btn { background: #e0e0e0; color: #555; }
        
        #question-text { 
            font-family: 'Pretendard', sans-serif; 
            font-size: 1.4rem; 
            font-weight: 700; 
            margin: 20px 0 40px 0; 
            line-height: 1.5; 
            word-break: keep-all; 
            min-height: 100px;
        }
        
        .btn-group { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .ox-btn { font-size: 2.8rem; padding: 20px 0; width: 130px; margin: 0; }
        .btn-o { background: var(--btn-o-gradient); color: white; }
        .btn-x { background: var(--btn-x-gradient); color: white; }

        .modal-overlay {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; background: rgba(255, 255, 255, 0.98); padding: 40px 20px; border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3); z-index: 200; backdrop-filter: blur(5px);
        }

        /* 정답 팝업 (초록색) */
        #success-toast {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(235, 255, 240, 0.95); padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3); z-index: 300; backdrop-filter: blur(5px);
            border: 2px solid var(--primary-green); width: 70%; opacity: 0;
        }

        /* 오답 팝업 (빨간색) */
        #error-toast {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 235, 235, 0.95); padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.3); z-index: 300; backdrop-filter: blur(5px);
            border: 2px solid var(--primary-red); width: 70%; opacity: 0;
        }

        .success-anim { animation: successFadeInOut 0.8s ease-in-out forwards; }
        @keyframes successFadeInOut {
            0% { opacity: 0; transform: translate(-50%, -30%); }
            15% { opacity: 1; transform: translate(-50%, -50%); }
            85% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -60%); }
        }

        .error-anim { animation: errorFadeInOut 1.5s ease-in-out forwards; }
        @keyframes errorFadeInOut {
            0% { opacity: 0; transform: translate(-50%, -30%); }
            10% { opacity: 1; transform: translate(-50%, -50%); }
            90% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -60%); }
        }

        .ranking-box { background: rgba(255, 255, 255, 0.8); border-radius: 20px; padding: 20px; margin: 25px 0; text-align: left; max-height: 250px; overflow-y: auto; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px 8px; border-bottom: 1px solid #eee; font-size: 1rem; font-weight: 600; }
        
        .notice { font-size: 0.9rem; color: #d63031; background: #fff5f5; padding: 12px; border-radius: 10px; margin-bottom: 15px; line-height: 1.4; }
        .note-list { max-height: 180px; overflow-y: auto; text-align: left; background: rgba(255, 255, 255, 0.8); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .note-item { margin-bottom: 10px; font-size: 0.95rem; border-bottom: 1px dashed #ddd; padding-bottom: 8px; line-height: 1.4; }
        .note-author { font-weight: bold; color: var(--primary-blue); }

        @media screen and (max-width: 480px) {
            .glass-card { width: 92%; padding: 25px 20px; border-radius: 20px; }
            h1 { font-size: 1.4rem; margin-bottom: 20px; }
            h1 span.sub-title { font-size: 1.8rem; }
            #question-text { font-size: 1.25rem; margin-bottom: 30px; }
            .ox-btn { width: 110px; font-size: 2.2rem; padding: 15px 0; }
            .main-btn { width: 95%; font-size: 1rem; padding: 12px 20px; }
            input[type="text"], input[type="number"], input[type="password"], select { width: 95%; font-size: 0.95rem; }
            .modal-overlay { padding: 30px 15px; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1 id="quiz-title">
            인천동양중학교 3학년 1학기 1회시험 대비 ✍️
            <span class="sub-title">역사 OX 퀴즈 문제창고 🏛️</span>
        </h1>
        
        <div class="progress-container" id="progress-container"><div id="progress-fill"></div></div>

        <div id="login-section" class="section active">
            <input type="number" id="student-id" placeholder="학번 5자리 (예: 30101) 🆔">
            <input type="text" id="student-name" placeholder="이름 (예: 김동양) 👤">
            <p style="margin: 15px 0 8px; font-weight: bold; font-size: 1rem; color: #444;">풀어볼 문제 수를 선택하세요 🎯</p>
            <select id="question-count">
                <option value="10">10문제 (가볍게 몸풀기)</option>
                <option value="20">20문제 (실력 점검)</option>
                <option value="30">30문제 (명예의 전당 🏆)</option>
                <option value="50">50문제 (집중 훈련 🏆)</option>
                <option value="100">100문제 (시험 대비 마스터 🏆)</option>
                <option value="200">전체 문제 (끝장보기 🏆)</option>
            </select>
            <br>
            <button class="main-btn start-btn" onclick="startQuiz()">퀴즈 시작하기 🚀</button>
        </div>

        <div id="quiz-section" class="section">
            <div id="status-container">
                <div id="quiz-status"></div>
                <div id="accuracy-status">정답률: -%</div>
            </div>
            <div id="question-text"></div>
            <div class="btn-group">
                <button class="main-btn ox-btn btn-o" onclick="checkAnswer('O')">O</button>
                <button class="main-btn ox-btn btn-x" onclick="checkAnswer('X')">X</button>
            </div>
        </div>

        <div id="note-input-section" class="section">
            <h2 id="note-title" style="font-size: 1.6rem; color: var(--primary-blue);">정답입니다! (X) 💯</h2>
            <div class="notice">다른 친구들도 참고하니 바르게 고쳐 적어주세요.</div>
            <input type="text" id="note-input" placeholder="틀린 이유나 올바른 사실을 적어주세요.">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                <button id="submit-btn" class="main-btn" style="background:linear-gradient(45deg, #4facfe, #00f2fe);" onclick="submitNote()">등록하기 📝</button>
                <button class="main-btn skip-btn" onclick="skipNote()">건너뛰기 ⏩</button>
            </div>
        </div>

        <div id="note-view-section" class="section">
            <h2 style="font-size: 1.4rem;">친구들의 오답 노트 👀</h2>
            <div class="note-list" id="note-list-container"></div>
            <button class="main-btn" style="background: var(--btn-finish-gradient);" onclick="nextQuiz()">다음 문제로 ➡️</button>
        </div>

        <div id="end-section" class="section">
            <h2 style="font-size: 2rem;" id="final-msg">수고하셨습니다! 🎉</h2>
            <div id="ranking-container" style="display: none;">
                <h3 class="jua-font" style="font-size: 1.4rem; color: #d35400; margin-bottom: 10px;">🏆 명예의 전당 (Top 10)</h3>
                <div class="ranking-box" id="ranking-list"></div>
            </div>
            <button class="main-btn" style="background: var(--btn-finish-gradient);" onclick="location.reload()">처음으로 돌아가기 🔄</button>
        </div>

        <div id="admin-panel" style="display: none; margin-top: 25px; gap: 10px; justify-content: center; flex-direction: column; align-items: center;">
            <p style="font-weight:bold; color:var(--primary-red); margin:0;">🚨 관리자 모드 활성화됨</p>
            <div style="display:flex; gap:10px;">
                <button onclick="resetNotes()" style="font-size: 0.9rem; background: #fab1a0; color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer;">오답노트 초기화</button>
                <button onclick="resetRankings()" style="font-size: 0.9rem; background: #e17055; color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer;">랭킹 초기화</button>
            </div>
        </div>

        <div id="success-toast">
            <div class="jua-font" style="color:var(--primary-green); font-size:2.2rem; font-weight:bold;">정답입니다! 🎉</div>
        </div>

        <div id="error-toast">
            <div class="jua-font" style="color:var(--primary-red); font-size:2.2rem; font-weight:bold;">아쉬워요! 틀렸습니다 🤔</div>
        </div>

        <div id="alert-modal" class="modal-overlay">
            <div id="alert-msg" class="jua-font" style="color:var(--text-main); margin-bottom:25px; font-size:1.4rem; line-height: 1.4;"></div>
            <div style="display: flex; justify-content: center;">
                <button class="main-btn start-btn" onclick="closeAlert()" style="width:120px; padding:12px;">확인</button>
            </div>
        </div>

        <div id="password-modal" class="modal-overlay">
            <div class="jua-font" style="color:var(--text-main); margin-bottom:20px; font-size:1.6rem;">관리자 확인 🔑</div>
            <input type="password" id="admin-pwd" placeholder="비밀번호를 입력하세요">
            <div style="display: flex; justify-content: center; gap: 10px;">
                <button class="main-btn start-btn" onclick="checkAdminPassword()" style="width:100px; padding:12px; margin:0;">확인</button>
                <button class="main-btn skip-btn" onclick="closePasswordModal()" style="width:100px; padding:12px; margin:0;">취소</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDOsvNxPNjYto92hfzGXyrRLce5F1sHtiQ",
            authDomain: "historyoxquiz.firebaseapp.com",
            projectId: "historyoxquiz",
            storageBucket: "historyoxquiz.firebasestorage.app",
            messagingSenderId: "353431656454",
            appId: "1:353431656454:web:4ae6d8bb9a59fe0902cb87"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let userInfo = { id: "", name: "", max: 0 };
        let currentQuizIndex = 0, selectedQuizzes = [], correctCount = 0, answeredCount = 0, isFirstAttempt = true;
        let alertCallback = null;

        function showAlert(msg, callback = null) {
            document.getElementById('alert-msg').innerHTML = msg;
            document.getElementById('alert-modal').style.display = 'block';
            alertCallback = callback;
        }

        function closeAlert() {
            document.getElementById('alert-modal').style.display = 'none';
            if (alertCallback) {
                let cb = alertCallback;
                alertCallback = null;
                cb();
            }
        }

        function showSuccessToast(callback) {
            const toast = document.getElementById('success-toast');
            toast.classList.remove('success-anim');
            void toast.offsetWidth; 
            toast.style.display = 'block';
            toast.classList.add('success-anim');

            setTimeout(() => {
                toast.style.display = 'none';
                if(callback) callback();
            }, 800);
        }

        function showErrorToast(callback) {
            const toast = document.getElementById('error-toast');
            toast.classList.remove('error-anim');
            void toast.offsetWidth; 
            toast.style.display = 'block';
            toast.classList.add('error-anim');

            setTimeout(() => {
                toast.style.display = 'none';
                if(callback) callback();
            }, 1500);
        }

        const allQuizzes = [
            { question: "구석기 시대 사람들은 뗀석기를 사용하였다.", answer: "O" },
            { question: "구석기 시대 사람들은 주로 정착 생활을 하였다.", answer: "X" },
            { question: "구석기 시대 사람들은 채집, 사냥, 고기잡이를 통해 식량을 마련하였다.", answer: "O" },
            { question: "구석기 시대의 대표적 유적지로 경기 연천 전곡리, 충남 공주 석장리 등이 있다.", answer: "O" },
            { question: "전곡리에서 발견된 아슐리안형 주먹도끼는 동아시아에 주먹도끼가 없다는 기존 이론을 뒷받침하였다.", answer: "X" },
            { question: "구석기 시대 사람들은 간석기를 주로 사용하였다.", answer: "X" },
            { question: "구석기 시대 사람들은 동굴이나 바위 그늘, 막집 등에서 생활하였다.", answer: "O" },
            { question: "신석기 시대에는 농경과 목축이 시작되었다.", answer: "O" },
            { question: "신석기 시대 사람들은 움집을 짓고 정착 생활을 하였다.", answer: "O" },
            { question: "신석기 시대의 대표적인 토기는 민무늬 토기이다.", answer: "X" },
            { question: "신석기 시대 사람들은 가락바퀴로 실을 뽑고 뼈바늘로 옷을 지어 입었다.", answer: "O" },
            { question: "신석기 시대 사람들은 반달 돌칼로 실을 뽑았다.", answer: "X" },

            { question: "신석기 시대 대표 유적지로 서울 암사동, 부산 동삼동 등이 있다.", answer: "O" },
            { question: "신석기 시대에는 이동 생활을 하며 동굴과 막집에서 생활하였다.", answer: "X" },
            { question: "신석기 시대에는 빗살무늬 토기를 사용하여 곡식을 저장하고 음식을 조리하였다.", answer: "O" },

            { question: "위만은 고조선에서 왕위를 빼앗고 중계 무역으로 많은 경제적 이익을 얻었다.", answer: "O" },

        function startQuiz() {
            const sid = document.getElementById('student-id').value;
            const sname = document.getElementById('student-name').value;
            const count = parseInt(document.getElementById('question-count').value);

            if(!sid || !sname) return showAlert("학번과 이름을 모두 입력해주세요. 📝");
            if(sid.length !== 5) return showAlert("학번을 5자리로 입력해주세요. 🔢<br><span style='font-size:0.9rem; color:#666;'>(예: 30101)</span>");

            correctCount = 0; answeredCount = 0;
            userInfo.id = sid; userInfo.name = sname; 
            userInfo.max = Math.min(count, allQuizzes.length);

            selectedQuizzes = [...allQuizzes].sort(() => 0.5 - Math.random()).slice(0, userInfo.max);
            
            document.getElementById('login-section').classList.remove('active');
            document.getElementById('quiz-section').classList.add('active');
            document.getElementById('progress-container').style.display = 'block';
            document.getElementById('status-container').style.display = 'flex';
            loadQuiz();
        }

        function loadQuiz() {
            isFirstAttempt = true;
            const q = selectedQuizzes[currentQuizIndex];
            document.getElementById('question-text').innerText = q.question;
            document.getElementById('quiz-status').innerText = `${currentQuizIndex + 1} / ${userInfo.max}`;
            document.getElementById('progress-fill').style.width = (currentQuizIndex / userInfo.max * 100) + "%";
            updateAccuracyDisplay();
        }

        function updateAccuracyDisplay() {
            const accElement = document.getElementById('accuracy-status');
            if (answeredCount === 0) {
                accElement.innerText = "정답률: -%";
            } else {
                const rate = Math.round((correctCount / answeredCount) * 100);
                accElement.innerText = `정답률: ${rate}%`;
                accElement.style.color = rate >= 80 ? "#4facfe" : (rate >= 50 ? "#e67e22" : "var(--primary-red)");
            }
        }

        function checkAnswer(choice) {
            // 팝업 애니메이션 도중 연타하는 것을 완벽 방지
            if (!isFirstAttempt) return;

            const correct = selectedQuizzes[currentQuizIndex].answer;
            answeredCount++;
            if (choice === correct) correctCount++;
            isFirstAttempt = false;
            updateAccuracyDisplay();

            if (choice === correct) {
                // 정답을 맞춘 경우
                if (correct === 'X') {
                    document.getElementById('note-title').innerHTML = "정답입니다! (X) 💯";
                    document.getElementById('note-title').style.color = "var(--primary-blue)";
                    showSection('note-input-section');
                } else {
                    showSuccessToast(() => {
                        nextQuiz();
                    });
                }
            } else {
                // 오답인 경우: 1.5초 토스트 후 자동으로 분기 이동
                showErrorToast(() => {
                    if (correct === 'X') {
                        // 틀렸지만 원래 정답이 X인 경우 오답노트로
                        document.getElementById('note-title').innerHTML = "아쉽네요, 정답은 (X) 입니다! 📝";
                        document.getElementById('note-title').style.color = "var(--primary-red)";
                        showSection('note-input-section');
                    } else {
                        // 틀렸고 원래 정답이 O인 경우 다음 문제로
                        nextQuiz();
                    }
                });
            }
        }

        function submitNote() {
            const txt = document.getElementById('note-input').value;
            if(txt.trim() === "") return showAlert("내용을 입력해주세요.");
            
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "등록 중...";
            
            db.collection("quiz_notes").add({
                quizId: allQuizzes.indexOf(selectedQuizzes[currentQuizIndex]),
                author: `${userInfo.id} ${userInfo.name}`,
                text: txt,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                document.getElementById('note-input').value = "";
                btn.disabled = false; btn.innerText = "등록하기 📝";
                showOtherNotes();
            });
        }

        function skipNote() {
            nextQuiz();
        }

        function showOtherNotes() {
            showSection('note-view-section');
            const container = document.getElementById('note-list-container');
            container.innerHTML = "로딩 중... ⏳";
            db.collection("quiz_notes").where("quizId", "==", allQuizzes.indexOf(selectedQuizzes[currentQuizIndex]))
              .orderBy("timestamp", "asc").get().then((snap) => {
                  container.innerHTML = snap.empty ? "아직 작성된 오답 노트가 없습니다. 첫 번째 주인이 되어주세요! ✨" : "";
                  snap.forEach(doc => {
                      const n = doc.data();
                      container.innerHTML += `<div class="note-item"><span class="note-author">${n.author}</span><br>${n.text}</div>`;
                  });
              });
        }

        function nextQuiz() {
            currentQuizIndex++;
            if (currentQuizIndex < userInfo.max) {
                showSection('quiz-section');
                loadQuiz();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            document.getElementById('progress-fill').style.width = "100%";
            document.getElementById('status-container').style.display = 'none';
            showSection('end-section');
            const finalRate = answeredCount === 0 ? 0 : Math.round((correctCount / answeredCount) * 100);
            document.getElementById('final-msg').innerText = `최종 정답률: ${finalRate}%`;
            if (userInfo.max >= 30) {
                document.getElementById('ranking-container').style.display = 'block';
                saveAndLoadRanking(finalRate);
            }
        }

        function saveAndLoadRanking(rate) {
            const listEl = document.getElementById('ranking-list');
            listEl.innerHTML = "랭킹 기록 중... ⏳";
            db.collection("quiz_rankings").add({
                author: `${userInfo.id} ${userInfo.name}`,
                score: rate, count: userInfo.max,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                db.collection("quiz_rankings").orderBy("score", "desc").limit(10).get().then(snap => {
                    listEl.innerHTML = "";
                    let r = 1;
                    snap.forEach(doc => {
                        const d = doc.data();
                        let icon = r === 1 ? "🥇" : (r === 2 ? "🥈" : (r === 3 ? "🥉" : ""));
                        listEl.innerHTML += `<div class="rank-item"><span>${r}. ${icon} ${d.author}</span> <b style="color:#4a90e2;">${d.score}%</b></div>`;
                        r++;
                    });
                });
            });
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        let adminCount = 0;
        let adminTimer = null;

        document.getElementById('quiz-title').onclick = () => {
            adminCount++;
            clearTimeout(adminTimer); 
            
            if(adminCount >= 5) { 
                adminCount = 0; 
                document.getElementById('password-modal').style.display = 'block';
                document.getElementById('admin-pwd').value = '';
                document.getElementById('admin-pwd').focus();
            } else {
                adminTimer = setTimeout(() => { adminCount = 0; }, 2000);
            }
        };

        function checkAdminPassword() {
            const pwd = document.getElementById('admin-pwd').value;
            if (pwd === "동양중") {
                document.getElementById('password-modal').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'flex';
            } else {
                document.getElementById('password-modal').style.display = 'none';
                showAlert("<span style='color:var(--primary-red);'>비밀번호가 틀렸습니다. 😅</span>");
            }
        }

        function closePasswordModal() {
            document.getElementById('password-modal').style.display = 'none';
        }

        function resetNotes() {
            if(confirm("오답노트를 모두 삭제할까요?")) {
                db.collection("quiz_notes").get().then(s => {
                    const b = db.batch(); s.forEach(d => b.delete(d.ref)); return b.commit();
                }).then(() => alert("삭제 완료 ✔️"));
            }
        }

        function resetRankings() {
            if(confirm("랭킹을 모두 삭제할까요?")) {
                db.collection("quiz_rankings").get().then(s => {
                    const b = db.batch(); s.forEach(d => b.delete(d.ref)); return b.commit();
                }).then(() => alert("삭제 완료 ✔️"));
            }
        }
    </script>
